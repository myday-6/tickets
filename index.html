<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="계정별 콘서트 티켓 데이터를 Google Sheets와 연동하여 관리하는 웹앱">
  <meta name="theme-color" content="#FFFDF0">
  <title>🎫 티켓 관리 시스템</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── 로딩 오버레이 ── -->
  <div id="loader" class="loader-overlay hidden">
    <div class="loader-spinner"></div>
    <p id="loader-text" class="">불러오는 중...</p>
  </div>

  <!-- ── 토스트 알림 ── -->
  <div id="toast-container" role="alert" aria-live="polite"></div>

  <!-- ── GAS URL 미설정 경고 배너 ── -->
  <div id="config-banner" class="config-banner hidden">
    ⚠️ config.js에서 GAS_URL을 설정해주세요. 데이터 저장/불러오기가 작동하지 않습니다.
  </div>

  <!-- ── 공통 모달 ── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-icon" id="modal-close" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- ── 앱 헤더 ── -->
  <header class="app-header" role="banner">
    <div class="app-header-content">
      <h1 class="app-title">🎫 티켓 관리 시스템</h1>
      <nav class="app-nav" role="navigation" aria-label="메인 메뉴">
        <button class="nav-btn active" data-page="dashboard"   id="nav-dashboard"   aria-label="티켓 리스트">📋 티켓 리스트</button>
        <button class="nav-btn"        data-page="add-ticket"  id="nav-add-ticket"  aria-label="티켓 추가">➕ 티켓 추가</button>
        <button class="nav-btn"        data-page="accounts"    id="nav-accounts"    aria-label="계정 관리">👤 계정 관리</button>
        <button class="nav-btn"        data-page="concerts"    id="nav-concerts"    aria-label="콘서트 관리">🎵 콘서트 관리</button>
      </nav>
    </div>
  </header>

  <!-- ── 메인 콘텐츠 ── -->
  <main class="app-main" role="main">

    <!-- 대시보드 (기본 페이지) -->
    <section id="page-dashboard" class="page" aria-label="티켓 리스트">
      <div class="empty-state">
        <span class="empty-icon">🎫</span>
        <p>데이터를 불러오는 중입니다...</p>
      </div>
    </section>

    <!-- 티켓 추가 -->
    <section id="page-add-ticket" class="page hidden" aria-label="티켓 추가">
    </section>

    <!-- 계정 관리 -->
    <section id="page-accounts" class="page hidden" aria-label="계정 관리">
    </section>

    <!-- 콘서트 관리 -->
    <section id="page-concerts" class="page hidden" aria-label="콘서트 관리">
    </section>

  </main>

  <!-- ── 스크립트 (순서 중요) ── -->
  <script src="config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/loader.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/accounts.js"></script>
  <script src="js/pages/concerts.js"></script>
  <script src="js/pages/addTicket.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
